<script>
async function askAI() {
    const prompt = document.getElementById('aiInstruction').value;
    const currentCode = editor.value;
    const btn = document.getElementById('aiBtn');

    btn.innerText = "AI가 전산 수정 중... (1070 가동)";
    btn.disabled = true;

    try {
        const response = await fetch('http://localhost:11434/api/generate', {
            method: 'POST',
            body: JSON.stringify({
                model: "qwen2.5-coder:7b", // 설치하신 모델명
                prompt: `너는 ERP 설계 전문가야. 다음 코드를 요약하지 말고 전체를 수정해서 줘. 요청: ${prompt}\n\n코드:\n${currentCode}`,
                stream: false
            })
        });
        const data = await response.json();
        
        // AI가 준 결과물에서 코드 부분만 추출하여 에디터에 자동 삽입
        const newCode = data.response.match(/<html[\s\S]*<\/html>/i)?.[0] || data.response;
        editor.value = newCode; 
        updatePreview(); // 미리보기 자동 갱신
    } catch (e) {
        alert("Ollama가 켜져 있는지 확인해주세요!");
    } finally {
        btn.innerText = "실시간 수정 요청";
        btn.disabled = false;
    }
}
</script>
