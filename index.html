<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>PLAY SPOT - 실시간 코드 인덱서</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; height: 100vh; overflow: hidden; }
        .editor-container { height: calc(100vh - 120px); }
        iframe { background: white; width: 100%; height: 100%; border: none; border-radius: 8px; }
        textarea { font-family: 'Courier New', monospace; background: #1e293b; color: #f8fafc; }
    </style>
</head>
<body class="p-4">
    <header class="flex justify-between items-center mb-4 bg-blue-900 p-4 rounded-lg shadow-xl">
        <h1 class="font-bold text-xl">PLAY SPOT <span class="text-blue-300">LIVE INDEXER</span></h1>
        <div class="flex space-x-2">
            <button onclick="updatePreview()" class="bg-emerald-500 hover:bg-emerald-600 px-4 py-2 rounded font-bold text-sm">실시간 반영</button>
            <button onclick="copyForAI()" class="bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded font-bold text-sm">AI용 프롬프트 복사</button>
        </div>
    </header>

    <div class="grid grid-cols-2 gap-4 editor-container">
        <div class="flex flex-col">
            <label class="text-xs text-gray-400 mb-1 uppercase font-bold">Source Code (index.html)</label>
            <textarea id="codeEditor" class="flex-grow p-4 border border-slate-700 rounded-lg outline-none focus:ring-2 focus:ring-blue-500" placeholder="여기에 index.html 코드를 붙여넣으세요..."></textarea>
        </div>

        <div class="flex flex-col">
            <label class="text-xs text-gray-400 mb-1 uppercase font-bold">Live Preview</label>
            <div class="flex-grow shadow-2xl">
                <iframe id="previewFrame"></iframe>
            </div>
        </div>
    </div>

    <footer class="mt-4 bg-slate-800 p-4 rounded-lg flex items-center space-x-4">
        <div class="flex-grow">
            <input type="text" id="aiInstruction" class="w-full bg-slate-900 border border-slate-700 p-2 rounded text-sm outline-none focus:border-blue-400" placeholder="AI에게 시킬 내용을 적으세요 (예: 상단바에 로그아웃 버튼 추가)">
        </div>
        <div class="text-xs text-gray-500 italic">"전체 코드로 제공" 규칙이 자동 적용됩니다.</div>
    </footer>

    <script>
        // 1. 코드를 입력하면 실시간으로 미리보기에 반영
        function updatePreview() {
            const code = document.getElementById('codeEditor').value;
            const iframe = document.getElementById('previewFrame');
            const doc = iframe.contentDocument || iframe.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();
        }

        // 2. 현재 코드 + 사용자 지시사항을 합쳐서 AI에게 줄 프롬프트 생성
        function copyForAI() {
            const currentCode = document.getElementById('codeEditor').value;
            const instruction = document.getElementById('aiInstruction').value;

            if(!currentCode) { alert("코드를 먼저 입력해주세요!"); return; }

            const finalPrompt = `
### SYSTEM RULES ###
1. 너는 전산 시스템 개발 전문가다.
2. 코드는 절대 임의로 변환하지 마라.
3. 수정 요청 사항만 반영하되, 전체 소스 코드를 생략 없이 다 보여줘.

### CURRENT CODE (index.html) ###
${currentCode}

### USER REQUEST ###
"${instruction}"

위의 코드를 분석해서 요청 사항이 반영된 '전체 코드'를 다시 작성해줘.
            `.trim();

            navigator.clipboard.writeText(finalPrompt).then(() => {
                alert("AI용 프롬프트가 복사되었습니다! 제미나이나 로컬 AI에 붙여넣으세요.");
            });
        }

        // 실시간 반영 이벤트
        document.getElementById('codeEditor').addEventListener('input', updatePreview);
    </script>
</body>
</html>
