<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLAY SPOT - AI Prompt Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f4f8; }
        .erp-header { background-color: #1e40af; } /* 짙은 파란색 테마 */
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-primary { background-color: #2563eb; color: white; transition: all 0.2s; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .rule-tag { background-color: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="erp-header text-white p-4 rounded-t-lg flex justify-between items-center shadow-lg">
        <div class="flex items-center space-x-3">
            <span class="font-bold text-xl uppercase tracking-wider">PLAY SPOT</span>
            <span class="text-blue-200 text-sm">| AI 개발 지원 도구</span>
        </div>
        <div class="text-sm opacity-80">2026-04-05 일요일</div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
        
        <section class="card p-6 border-t-4 border-blue-600">
            <h2 class="text-lg font-bold mb-4 flex items-center text-gray-700">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                프롬프트 구성
            </h2>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-600 mb-2 underline">시스템 고정 규칙 (절대 변경 불가)</label>
                <div class="space-y-2">
                    <div class="rule-tag px-3 py-2 rounded text-xs font-medium italic">
                        "코드는 절대적으로 마음대로 변환하지 말 것"
                    </div>
                    <div class="rule-tag px-3 py-2 rounded text-xs font-medium italic">
                        "기본으로 전체 소스 코드로 제공할 것 (요약/생략 금지)"
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-600 mb-2">작업 유형 선택</label>
                <select id="taskType" class="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                    <option value="ui_fix">🎨 UI 수정 및 레이아웃 개선 (Android/Web)</option>
                    <option value="db_logic">💾 Supabase DB 연동 및 쿼리 작성</option>
                    <option value="debug">🐛 에러 수정 및 디버깅</option>
                    <option value="new_feat">🚀 새로운 기능 구현</option>
                </select>
            </div>

            <div class="mb-6">
                <label class="block text-sm font-semibold text-gray-600 mb-2">상세 요구 사항 입력</label>
                <textarea id="userInput" rows="4" class="w-full p-3 border rounded focus:ring-2 focus:ring-blue-500 outline-none text-sm" placeholder="예: 거래처 수정 버튼을 누르면 확인 팝업이 뜨게 해줘."></textarea>
            </div>

            <button onclick="generatePrompt()" class="w-full btn-primary py-3 rounded-lg font-bold shadow-md uppercase tracking-tighter">
                프롬프트 생성하기
            </button>
        </section>

        <section class="card p-6 border-t-4 border-emerald-500">
            <h2 class="text-lg font-bold mb-4 flex items-center text-gray-700">
                <svg class="w-5 h-5 mr-2 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                최종 결과 (AI 전달용)
            </h2>
            
            <div class="relative">
                <textarea id="finalPrompt" readonly class="w-full h-80 p-4 bg-gray-50 border rounded text-sm text-gray-800 leading-relaxed overflow-y-auto" placeholder="결과가 여기에 표시됩니다."></textarea>
                <button onclick="copyPrompt()" class="absolute top-2 right-2 bg-white border px-3 py-1 rounded text-xs font-medium hover:bg-gray-100 shadow-sm">
                    복사하기
                </button>
            </div>

            <p class="mt-4 text-xs text-gray-400">
                * 이 내용을 복사하여 제미나이(Gemini) 또는 로컬 AI(Ollama) 채팅창에 붙여넣으세요.
            </p>
        </section>

    </main>

    <script>
        function generatePrompt() {
            const taskType = document.getElementById('taskType').value;
            const userInput = document.getElementById('userInput').value;
            
            // 사용자님의 핵심 규칙 정의
            const systemRules = [
                "1. 네 역할: 10년 차 ERP 시스템 및 안드로이드 전문 개발자.",
                "2. 코드 변환 규칙: 내가 주는 코드는 절대적으로 마음대로 변환하지 마라.",
                "3. 수정 범위: 사용자가 원하는 부분만 수정하여 반영할 것.",
                "4. 출력 형식: 절대로 요약하거나 줄이지 말고 '전체 소스 코드'를 완성형으로 제공할 것."
            ].join('\n');

            let taskInstruction = "";
            if(taskType === 'ui_fix') taskInstruction = "[작업: UI 수정] 이미지 기반의 PLAY SPOT ERP 스타일을 유지하며 UI를 개선해줘.";
            if(taskType === 'db_logic') taskInstruction = "[작업: DB 연동] Supabase 테이블 구조와 연동되는 효율적인 로직을 짜줘.";
            if(taskType === 'debug') taskInstruction = "[작업: 에러 수정] 다음 발생하는 에러 로그를 분석하고 원본 코드를 유지하며 수정해줘.";
            if(taskType === 'new_feat') taskInstruction = "[작업: 기능 추가] 기존 시스템의 디자인 규칙을 준수하며 새로운 기능을 추가해줘.";

            const finalPrompt = `### SYSTEM RULES ###\n${systemRules}\n\n### TASK ###\n${taskInstruction}\n\n### USER REQUIREMENTS ###\n${userInput || "상세기능 없음"}\n\n위 지침에 따라 수정된 전체 코드를 작성해줘.`;

            document.getElementById('finalPrompt').value = finalPrompt;
        }

        function copyPrompt() {
            const text = document.getElementById('finalPrompt');
            text.select();
            document.execCommand('copy');
            alert('프롬프트가 복사되었습니다!');
        }
    </script>
</body>
</html>
